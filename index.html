<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azaan Collection</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        audio { width: 100%; margin-top: 10px; }
        h1 { text-align: center; color: #333; }
    </style>
</head>
<body>
    <h1>Azaan Audio Library</h1>

    <div class="card">
        <h3>Azaan Makkah</h3>
        <audio controls src="Azaan/azaan_makkah.mp3"></audio>
    </div>

    <div class="card">
        <h3>Azaan Madinah</h3>
        <audio controls src="Azaan/azaan_madinah.mp3"></audio>
    </div>

    <div class="card">
        <h3>Azaan Fajr</h3>
        <audio controls src="Azaan/azaan_fajr.mp3"></audio>
    </div>

    <div class="card">
        <h3>Azaan Default</h3>
        <audio controls src="Azaan/azaan_default.mp3"></audio>
    </div>
</body>
</html>
