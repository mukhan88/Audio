<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Library</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f6f8fa;
            color: #24292e;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(27,31,35,0.12);
            border: 1px solid #e1e4e8;
        }
        h1 { border-bottom: 1px solid #eaecef; padding-bottom: 10px; }
        .audio-item {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
        }
        audio { width: 100%; margin-top: 10px; }
        .footer { font-size: 0.8em; color: #586069; margin-top: 40px; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>My Audio Collection</h1>
        <p>Welcome to my GitHub Pages audio repository.</p>

        <div class="audio-item">
            <h3>Track 1: Example Audio</h3>
            <p>Description of the audio file goes here.</p>
            <audio controls>
                <source src="track1.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>

        <div class="audio-item">
            <h3>Track 2: Sample Sound</h3>
            <audio controls>
                <source src="track2.wav" type="audio/wav">
                Your browser does not support the audio element.
            </audio>
        </div>
    </div>

    <div class="footer">
        Published with GitHub Pages
    </div>

</body>
</html>
